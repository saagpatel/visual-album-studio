name: quality-gates

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install bandit pip-audit
          cargo install cargo-audit --locked

      - name: Policy checks
        run: node scripts/ci/require-tests-and-docs.mjs

      - name: V2 Train 0 governance gate
        run: bash scripts/ci/v2_train0_gate.sh

      - name: Bootstrap toolchain
        run: ./scripts/bootstrap.sh

      - name: Verify commands
        env:
          VAS_SECURITY_STRICT: "1"
        run: bash .codex/scripts/run_verify_commands.sh

  pinned-toolchain-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install pinned Godot 4.4
        run: |
          mkdir -p out/tools/godot44/bin
          curl -fsSL -o /tmp/godot44.zip \
            https://github.com/godotengine/godot/releases/download/4.4-stable/Godot_v4.4-stable_linux.x86_64.zip
          unzip -q /tmp/godot44.zip -d out/tools/godot44/bin
          mv out/tools/godot44/bin/Godot_v4.4-stable_linux.x86_64 out/tools/godot44/bin/godot
          chmod +x out/tools/godot44/bin/godot

      - name: Bootstrap toolchain
        run: ./scripts/bootstrap.sh

      - name: AT-001 pinned smoke
        run: PATH="$PWD/out/tools/godot44/bin:$PATH" ./scripts/test/acceptance_phase_01.sh

      - name: AT-007 pinned smoke
        run: PATH="$PWD/out/tools/godot44/bin:$PATH" ./scripts/test/acceptance_phase_07.sh

  v2-train1-acceptance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Bootstrap toolchain
        run: ./scripts/bootstrap.sh

      - name: AT-V2-101 gate
        env:
          VAS_RELEASE_SIGNING_KEY: ${{ secrets.VAS_RELEASE_SIGNING_KEY }}
        run: bash scripts/test/acceptance_v2_train1.sh
