name: perf-foundation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, master]

jobs:
  perf-bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061
        with:
          version: 10.28.1
      - id: node-workspace
        run: |
          if [[ -f package.json ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No package.json found; skipping Node perf lane."
          fi
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        if: steps.node-workspace.outputs.present == 'true'
        with:
          node-version: 20
          cache: pnpm
      - if: steps.node-workspace.outputs.present == 'true'
        run: pnpm install --frozen-lockfile
      - if: steps.node-workspace.outputs.present == 'true'
        run: pnpm build || pnpm build:ui
      - if: steps.node-workspace.outputs.present == 'true'
        run: pnpm perf:bundle

  perf-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061
        with:
          version: 10.28.1
      - id: node-workspace
        run: |
          if [[ -f package.json ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No package.json found; skipping Node perf lane."
          fi
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        if: steps.node-workspace.outputs.present == 'true'
        with:
          node-version: 20
          cache: pnpm
      - if: steps.node-workspace.outputs.present == 'true'
        run: pnpm install --frozen-lockfile
      - if: steps.node-workspace.outputs.present == 'true'
        run: pnpm perf:build

  perf-lighthouse:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061
        with:
          version: 10.28.1
      - id: node-workspace
        run: |
          if [[ -f package.json ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No package.json found; skipping Node perf lane."
          fi
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        if: steps.node-workspace.outputs.present == 'true'
        with:
          node-version: 20
          cache: pnpm
      - if: steps.node-workspace.outputs.present == 'true'
        run: pnpm install --frozen-lockfile
      - if: steps.node-workspace.outputs.present == 'true'
        run: pnpm build || pnpm build:ui
      - if: steps.node-workspace.outputs.present == 'true'
        run: pnpm perf:lhci || true

  perf-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - run: bash scripts/perf/check-assets.sh

  perf-memory:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061
        with:
          version: 10.28.1
      - id: node-workspace
        run: |
          if [[ -f package.json ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No package.json found; skipping Node perf lane."
          fi
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        if: steps.node-workspace.outputs.present == 'true'
        with:
          node-version: 20
          cache: pnpm
      - if: steps.node-workspace.outputs.present == 'true'
        run: pnpm install --frozen-lockfile
      - if: steps.node-workspace.outputs.present == 'true'
        run: pnpm perf:memory

  perf-api:
    if: ${{ vars.PERF_BASE_URL != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: grafana/setup-k6-action@ffe7d7290dfa715e48c2ccc924d068444c94bde2
      - run: k6 run tests/perf/api.k6.js --summary-export=.perf-results/api-summary.json
        env:
          BASE_URL: ${{ vars.PERF_BASE_URL }}

  perf-db:
    if: ${{ vars.PERF_DATABASE_URL != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - run: psql "${{ vars.PERF_DATABASE_URL }}" -f scripts/perf/db/check-pg-stat.sql
